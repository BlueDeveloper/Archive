<svg width="1000" height="400" viewBox="0 0 1000 400"
     xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes brp-reveal {
      0%   { opacity: 0; transform: translateY(20px); }
      40%  { opacity: 1; transform: translateY(0); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
  <g style="animation: brp-reveal 1.2s ease-out 0.0s forwards;
              transform-origin: 230px 300px; opacity: 0;">
    <text x="230" y="300" text-anchor="middle"
          font-family="'Helvetica Neue', 'Inter', 'Poppins', 'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="380" font-weight="900"
          letter-spacing="-12" fill="#1E66C7">B</text>
  </g>
  <g style="animation: brp-reveal 1.2s ease-out 0.15s forwards;
              transform-origin: 500px 300px; opacity: 0;">
    <text x="500" y="300" text-anchor="middle"
          font-family="'Helvetica Neue', 'Inter', 'Poppins', 'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="380" font-weight="900"
          letter-spacing="-12" fill="#CF3A40">R</text>
  </g>
  <g style="animation: brp-reveal 1.2s ease-out 0.3s forwards;
              transform-origin: 770px 300px; opacity: 0;">
    <text x="770" y="300" text-anchor="middle"
          font-family="'Helvetica Neue', 'Inter', 'Poppins', 'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="380" font-weight="900"
          letter-spacing="-12" fill="#6F3CA3">P</text>
  </g>
</svg>
