<svg width="1000" height="400" viewBox="0 0 1000 400"
     xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes brp-cycle {
      0%   { opacity: 0; transform: translateY(18px); }
      20%  { opacity: 1; transform: translateY(0);          animation-timing-function: cubic-bezier(.22,.61,.36,1); }
      80%  { opacity: 1; transform: translateY(0);          animation-timing-function: cubic-bezier(.55,.06,.68,.19); }
      100% { opacity: 0; transform: translateY(0); }
    }
  </style>
  <text x="230" y="300" text-anchor="middle" font-family="'Helvetica Neue', 'Inter', 'Poppins', 'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="380" font-weight="900" letter-spacing="-12" fill="#1E66C7" style="animation: brp-cycle 2.0s 0.0s infinite; transform-origin: 230px 300px; opacity: 0;">B</text>
  <text x="500" y="300" text-anchor="middle" font-family="'Helvetica Neue', 'Inter', 'Poppins', 'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="380" font-weight="900" letter-spacing="-12" fill="#CF3A40" style="animation: brp-cycle 2.0s 0.15s infinite; transform-origin: 500px 300px; opacity: 0;">R</text>
  <text x="770" y="300" text-anchor="middle" font-family="'Helvetica Neue', 'Inter', 'Poppins', 'Segoe UI', system-ui, -apple-system, Arial, sans-serif" font-size="380" font-weight="900" letter-spacing="-12" fill="#6F3CA3" style="animation: brp-cycle 2.0s 0.3s infinite; transform-origin: 770px 300px; opacity: 0;">P</text>
</svg>